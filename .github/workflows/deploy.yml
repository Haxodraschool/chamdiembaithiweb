name: Deploy to GCP VM

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Cho phép trigger thủ công

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/chamdiembaithiweb
            
            # Backup CNN model files before pull (removed from git but needed for Docker)
            MODEL_DIR=grading/engine
            mkdir -p /tmp/model_backup
            cp -f $MODEL_DIR/bubble_cnn.onnx /tmp/model_backup/ 2>/dev/null || true
            cp -f $MODEL_DIR/bubble_cnn.onnx.data /tmp/model_backup/ 2>/dev/null || true
            cp -f $MODEL_DIR/bubble_cnn.pth /tmp/model_backup/ 2>/dev/null || true
            
            git pull origin main
            
            # Restore CNN model files after pull
            cp -f /tmp/model_backup/bubble_cnn.* $MODEL_DIR/ 2>/dev/null || true
            
            docker compose build
            docker compose up -d
            docker image prune -f
            echo "[OK] Deploy xong: $(date)"
