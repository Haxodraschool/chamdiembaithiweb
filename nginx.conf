# =============================================================================
# Nginx config cho GradeFlow — reverse proxy + static + media
# =============================================================================

upstream django {
    server web:8000;
}

# Tăng max body size để upload ảnh lớn
client_max_body_size 50M;

# ── HTTP: Let's Encrypt challenge + redirect → HTTPS ──
server {
    listen 80;
    server_name gradefloww.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Nếu chưa có SSL cert → serve trực tiếp (comment dòng return + uncomment proxy)
        return 301 https://$host$request_uri;

        # Fallback HTTP-only mode (dùng khi chưa cài SSL):
        # proxy_pass http://django;
        # proxy_set_header Host $host;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── HTTPS: main server ──
server {
    listen 443 ssl;
    http2 on;
    server_name gradefloww.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/gradefloww.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gradefloww.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (ảnh kết quả OMR)
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Django app
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
