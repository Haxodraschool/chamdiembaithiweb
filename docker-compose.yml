# =============================================================================
# GradeFlow — Docker Compose cho VPS (GCP / Oracle / DigitalOcean)
# =============================================================================
# Chạy:  docker compose up -d --build
# Logs:  docker compose logs -f web
# Stop:  docker compose down
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: gradeflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gradeflow}
      POSTGRES_USER: ${POSTGRES_USER:-gradeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gradeflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: gradeflow-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gradeflow}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-gradeflow}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      HYBRID_CNN_ENABLE: ${HYBRID_CNN_ENABLE:-1}
      PORT: 8000
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    container_name: gradeflow-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media:/app/media:ro
      - static:/app/staticfiles:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

volumes:
  pgdata:
  media:
  static:
